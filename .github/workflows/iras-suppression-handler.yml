# ============================================================
# IRAS Suppression Handler
# Triggered by sendgrid_suppressed repository_dispatch.
# Marks lead as suppressed in Supabase so they are never
# emailed again. Separate from the main pipeline to avoid
# blocking the scoring agent on bounce events.
# ============================================================

name: IRAS Suppression Handler

on:
  repository_dispatch:
    types:
      - sendgrid_suppressed
      - stripe_subscription_cancelled

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  suppress:
    name: 'Mark lead suppressed'
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet supabase

      - name: Suppress lead
        run: |
          python - << 'EOF'
          import os
          from supabase import create_client

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])

          event_action = "${{ github.event.action }}"
          lead_id      = "${{ github.event.client_payload.lead_id }}"
          email        = "${{ github.event.client_payload.email }}"
          reason       = "${{ github.event.client_payload.reason || github.event.action }}"
          stripe_id    = "${{ github.event.client_payload.stripe_customer_id }}"

          if lead_id:
              supabase.table("iras_leads").update({
                  "status": "suppressed",
                  "updated_at": "now()"
              }).eq("id", lead_id).execute()
              print(f"[SUPPRESS] lead_id={lead_id} reason={reason}")
          elif email:
              supabase.table("iras_leads").update({
                  "status": "suppressed",
                  "updated_at": "now()"
              }).eq("email", email).execute()
              print(f"[SUPPRESS] email={email} reason={reason}")
          elif stripe_id:
              # Subscription cancelled — mark customer inactive
              supabase.table("garcar_customers").update({
                  "status": "cancelled"
              }).eq("stripe_customer_id", stripe_id).execute()
              print(f"[SUPPRESS] customer stripe_id={stripe_id} cancelled")
          else:
              print("[SUPPRESS] No identifier in payload — skipping")
          EOF
