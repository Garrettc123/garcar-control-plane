name: CI/CD — Garcar Control Plane

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --if-present || echo "No package.json — skipping npm install"

      - name: Lint
        run: npx eslint . --ext .js,.ts,.tsx --max-warnings 0 || echo "No eslint config — skipping"

      - name: Type check
        run: npx tsc --noEmit || echo "No tsconfig — skipping"

      - name: Test
        run: npm test --if-present || echo "No test script — skipping"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

      - name: Health check
        env:
          APP_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_BASE_URL not set — skipping health check"
            exit 0
          fi
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health" || echo "000")
            echo "Attempt $i — $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 15
          done
          echo "Health check failed"
          exit 1
