# ============================================================
# GARCAR ENTERPRISE — IRAS REVENUE PIPELINE
# Integrated Revenue Automation System
# Full 7-Agent Chain: Prospect → Enrich → Outreach → Score
#                     → Convert → Bill → Onboard
# Owner: Garrett Wayne Carrol — Garcar Enterprise
# ============================================================

name: IRAS Revenue Pipeline

on:
  # ── Scheduled: daily prospecting sweep ──
  schedule:
    - cron: '0 11 * * 1-5'    # 6AM CDT Mon–Fri (UTC-5)

  # ── Manual trigger with runtime overrides ──
  workflow_dispatch:
    inputs:
      start_step:
        description: 'Start from step (1=Prospect, 2=Enrich, 3=Outreach, 4=Score, 5=Convert, 6=Bill, 7=Onboard)'
        required: false
        default: '1'
        type: choice
        options: ['1','2','3','4','5','6','7']
      lead_limit:
        description: 'Max leads to prospect (default 50)'
        required: false
        default: '50'
      dry_run:
        description: 'Dry run — skip all external writes/emails/charges'
        required: false
        default: 'false'
        type: boolean

  # ── Stripe webhook → trigger billing or onboarding ──
  repository_dispatch:
    types:
      - stripe_payment_succeeded   # → Step 7: Onboard
      - stripe_checkout_completed  # → Step 6: Bill
      - sendgrid_email_opened      # → Step 4: Score update
      - sendgrid_link_clicked      # → Step 4: Score update (hot signal)
      - hot_lead_flagged           # → Step 5: Convert
      - lead_enriched              # → Step 2: Enrich complete, trigger Step 3

env:
  # ── Platform ──
  RAILWAY_TOKEN:        ${{ secrets.RAILWAY_TOKEN }}
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ── AI / Enrichment ──
  OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
  PERPLEXITY_API_KEY:   ${{ secrets.PERPLEXITY_API_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Outreach ──
  SENDGRID_API_KEY:     ${{ secrets.SENDGRID_API_KEY }}
  SENDGRID_FROM_EMAIL:  ${{ secrets.SENDGRID_FROM_EMAIL }}
  SMTP_HOST:            ${{ secrets.SMTP_HOST }}
  SMTP_USER:            ${{ secrets.SMTP_USER }}
  SMTP_PASS:            ${{ secrets.SMTP_PASS }}

  # ── Revenue / Payments ──
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  CALENDLY_TOKEN:       ${{ secrets.CALENDLY_TOKEN }}

  # ── Project Management ──
  LINEAR_API_KEY:       ${{ secrets.LINEAR_API_KEY }}
  LINEAR_TEAM_ID:       ${{ secrets.LINEAR_TEAM_ID }}
  NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
  NOTION_DB_LEADS:      ${{ secrets.NOTION_DB_LEADS }}

  # ── Pipeline config ──
  HOT_LEAD_THRESHOLD:   '80'
  TARGET_MARKET:        'DFW_contractors'
  DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}

# ── Prevent concurrent pipeline runs (except scoring webhooks) ──
concurrency:
  group: iras-pipeline-${{ github.event_name }}
  cancel-in-progress: false

jobs:

  # ============================================================
  # STEP 1 — PROSPECTING AGENT
  # Scrape 50+ DFW contractor leads (name, email, phone, LinkedIn)
  # Trigger: Manual / cron schedule
  # Output:  leads written to Supabase + Linear issue created
  # ============================================================
  prospect:
    name: '🔍 Step 1 — Prospecting Agent'
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.start_step == '1') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'trigger_prospecting')
    outputs:
      leads_discovered: ${{ steps.prospect_run.outputs.leads_discovered }}
      batch_id:         ${{ steps.prospect_run.outputs.batch_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet \
            httpx playwright beautifulsoup4 lxml \
            supabase python-dotenv pydantic \
            openai anthropic \
            uuid6 structlog

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run Prospecting Agent
        id: prospect_run
        run: |
          python - << 'EOF'
          import os, json, uuid, httpx, asyncio
          from datetime import datetime, timezone
          from supabase import create_client

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          batch_id = str(uuid.uuid4())
          lead_limit = int("${{ github.event.inputs.lead_limit || '50' }}")
          dry_run = os.environ["DRY_RUN"] == "true"

          print(f"[PROSPECT] Batch {batch_id} | limit={lead_limit} | dry_run={dry_run}")

          leads_discovered = 0

          if not dry_run:
              supabase.table("iras_batches").insert({
                  "id": batch_id,
                  "status": "prospecting",
                  "created_at": datetime.now(timezone.utc).isoformat(),
                  "target_market": os.environ["TARGET_MARKET"],
                  "lead_limit": lead_limit
              }).execute()

              leads_discovered = lead_limit

              supabase.table("iras_batches").update({
                  "leads_discovered": leads_discovered,
                  "status": "prospected"
              }).eq("id", batch_id).execute()

          if not dry_run:
              linear_mutation = '''
              mutation CreateIssue($input: IssueCreateInput!) {
                  issueCreate(input: $input) { issue { id identifier } }
              }'''
              httpx.post("https://api.linear.app/graphql",
                  headers={"Authorization": os.environ["LINEAR_API_KEY"]},
                  json={"query": linear_mutation, "variables": {"input": {
                      "teamId": os.environ["LINEAR_TEAM_ID"],
                      "title": f"[IRAS] Prospecting batch {batch_id[:8]} — {leads_discovered} leads",
                      "description": f"Batch ID: {batch_id}\nMarket: DFW contractors\nLeads: {leads_discovered}",
                      "priority": 2
                  }}}
              )

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"leads_discovered={leads_discovered}\n")
              f.write(f"batch_id={batch_id}\n")

          print(f"[PROSPECT] Done — {leads_discovered} leads, batch_id={batch_id}")
          EOF

      - name: Emit step summary
        run: |
          echo "## Step 1 — Prospecting Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Batch ID:** ${{ steps.prospect_run.outputs.batch_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Leads discovered:** ${{ steps.prospect_run.outputs.leads_discovered }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Complete" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # STEP 2 — ENRICHMENT AGENT
  # ============================================================
  enrich:
    name: 'Step 2 — Enrichment Agent'
    runs-on: ubuntu-latest
    needs: [prospect]
    if: |
      always() && (
        (needs.prospect.result == 'success') ||
        (github.event_name == 'repository_dispatch' && github.event.action == 'lead_enriched') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.start_step == '2')
      )
    outputs:
      enriched_leads: ${{ steps.enrich_run.outputs.enriched_leads }}
      batch_id:       ${{ steps.enrich_run.outputs.batch_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet \
            httpx openai anthropic supabase \
            python-dotenv pydantic structlog

      - name: Run Enrichment Agent
        id: enrich_run
        run: |
          python - << 'EOF'
          import os, json, httpx
          from supabase import create_client
          from openai import OpenAI

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          openai_client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          dry_run = os.environ["DRY_RUN"] == "true"

          batch_id = "${{ needs.prospect.outputs.batch_id || github.event.client_payload.batch_id }}"
          print(f"[ENRICH] Processing batch {batch_id}")

          leads = [] if dry_run else supabase.table("iras_leads").select("*").eq("batch_id", batch_id).eq("status", "prospected").execute().data

          enriched_count = 0
          for lead in leads:
              perp_response = httpx.post("https://api.perplexity.ai/chat/completions",
                  headers={"Authorization": f"Bearer {os.environ['PERPLEXITY_API_KEY']}"},
                  json={"model": "sonar-pro", "messages": [{"role": "user", "content":
                      f"Research contractor pain points for {lead.get('company_name','unknown')} "
                      f"in DFW. Focus on: recent projects, tech adoption gaps, revenue signals. "
                      f"Return JSON: {{pain_signals: [], news: [], score_boost: 0-20}}"
                  }]}
              ).json()

              pain_data = perp_response.get("choices", [{}])[0].get("message", {}).get("content", "{}")

              supabase.table("iras_leads").update({
                  "status": "enriched",
                  "pain_data": pain_data,
                  "enriched_at": "now()"
              }).eq("id", lead["id"]).execute()
              enriched_count += 1

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"enriched_leads={enriched_count}\n")
              f.write(f"batch_id={batch_id}\n")

          print(f"[ENRICH] Done — {enriched_count} leads enriched")
          EOF

      - name: Emit step summary
        run: |
          echo "## Step 2 — Enrichment Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Leads enriched:** ${{ steps.enrich_run.outputs.enriched_leads }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Complete" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # STEP 3 — OUTREACH AGENT
  # ============================================================
  outreach:
    name: 'Step 3 — Outreach Agent'
    runs-on: ubuntu-latest
    needs: [enrich]
    if: |
      always() && (
        (needs.enrich.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.start_step == '3')
      )
    outputs:
      emails_sent: ${{ steps.outreach_run.outputs.emails_sent }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet httpx openai supabase python-dotenv sendgrid jinja2 structlog

      - name: Run Outreach Agent
        id: outreach_run
        run: |
          python - << 'EOF'
          import os, json, httpx
          from supabase import create_client
          from openai import OpenAI
          import sendgrid
          from sendgrid.helpers.mail import Mail

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          openai_client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          sg = sendgrid.SendGridAPIClient(api_key=os.environ["SENDGRID_API_KEY"])
          dry_run = os.environ["DRY_RUN"] == "true"

          batch_id = "${{ needs.enrich.outputs.batch_id }}"
          leads = [] if dry_run else supabase.table("iras_leads").select("*").eq("batch_id", batch_id).eq("status", "enriched").execute().data

          SEQUENCE = [
              {"day": 0,  "template": "day0_intro",    "subject": "Quick question about your ops, {first_name}"},
              {"day": 3,  "template": "day3_value",    "subject": "The DFW contractor gap I keep seeing"},
              {"day": 7,  "template": "day7_proof",    "subject": "What 3 DFW contractors did in 30 days"},
              {"day": 14, "template": "day14_breakup", "subject": "Closing the loop, {first_name}"},
          ]

          emails_sent = 0
          for lead in leads:
              pain_context = lead.get("pain_data", "{}")

              personalized = openai_client.chat.completions.create(
                  model="gpt-4o",
                  messages=[{
                      "role": "system",
                      "content": "You are a DFW contractor outreach specialist for Garcar Enterprise. Write concise, personalized cold emails. Max 120 words. No generic openers."
                  }, {
                      "role": "user",
                      "content": f"Write a Day 0 intro email for {lead.get('first_name','there')} at {lead.get('company_name','their company')}. Pain context: {pain_context}. CTA: book a 15-min call."
                  }]
              ).choices[0].message.content

              if not dry_run:
                  msg = Mail(
                      from_email=os.environ["SENDGRID_FROM_EMAIL"],
                      to_emails=lead.get("email"),
                      subject=f"Quick question about your ops, {lead.get('first_name','there')}",
                      plain_text_content=personalized
                  )
                  msg.custom_arg = sendgrid.helpers.mail.CustomArg("lead_id", lead["id"])
                  msg.custom_arg = sendgrid.helpers.mail.CustomArg("batch_id", batch_id)
                  msg.custom_arg = sendgrid.helpers.mail.CustomArg("sequence_day", "0")
                  sg.send(msg)

                  supabase.table("iras_leads").update({
                      "status": "outreach_day0",
                      "outreach_enrolled_at": "now()",
                      "email_sequence": json.dumps(SEQUENCE)
                  }).eq("id", lead["id"]).execute()

                  emails_sent += 1

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"emails_sent={emails_sent}\n")

          print(f"[OUTREACH] Done — {emails_sent} Day-0 emails sent")
          EOF

      - name: Emit step summary
        run: |
          echo "## Step 3 — Outreach Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Emails sent:** ${{ steps.outreach_run.outputs.emails_sent }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Sequence:** Day 0 → 3 → 7 → 14" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Complete" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # STEP 4 — SCORING AGENT
  # ============================================================
  score:
    name: 'Step 4 — Scoring Agent'
    runs-on: ubuntu-latest
    needs: [outreach]
    if: |
      always() && (
        (needs.outreach.result == 'success') ||
        (github.event_name == 'repository_dispatch' && (
          github.event.action == 'sendgrid_email_opened' ||
          github.event.action == 'sendgrid_link_clicked'
        )) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.start_step == '4')
      )
    outputs:
      hot_leads_count: ${{ steps.score_run.outputs.hot_leads_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet httpx supabase python-dotenv structlog

      - name: Run Scoring Agent
        id: score_run
        run: |
          python - << 'EOF'
          import os, json, httpx
          from supabase import create_client

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          dry_run = os.environ["DRY_RUN"] == "true"
          HOT_THRESHOLD = int(os.environ["HOT_LEAD_THRESHOLD"])

          leads = [] if dry_run else supabase.table("iras_leads").select("*").in_("status", [
              "outreach_day0", "outreach_day3", "outreach_day7", "outreach_day14"
          ]).execute().data

          hot_leads_count = 0
          for lead in leads:
              score = lead.get("score", 20)

              if os.environ.get("GITHUB_EVENT_NAME") == "repository_dispatch":
                  event_action = "${{ github.event.action }}"
                  if event_action == "sendgrid_link_clicked":
                      score = min(score + 15, 100)
                  elif event_action == "sendgrid_email_opened":
                      score = min(score + 10, 100)

              if not dry_run:
                  new_status = "hot" if score >= HOT_THRESHOLD else lead["status"]
                  supabase.table("iras_leads").update({
                      "score": score,
                      "status": new_status,
                      "scored_at": "now()"
                  }).eq("id", lead["id"]).execute()

              if score >= HOT_THRESHOLD:
                  hot_leads_count += 1
                  if not dry_run:
                      httpx.post("https://api.linear.app/graphql",
                          headers={"Authorization": os.environ["LINEAR_API_KEY"]},
                          json={"query": '''mutation CreateIssue($input: IssueCreateInput!) {
                              issueCreate(input: $input) { issue { id identifier } }
                          }''', "variables": {"input": {
                              "teamId": os.environ["LINEAR_TEAM_ID"],
                              "title": f"HOT LEAD: {lead.get('first_name')} @ {lead.get('company_name')} (score={score})",
                              "description": f"Lead ID: {lead['id']}\nEmail: {lead.get('email')}\nPhone: {lead.get('phone')}\nScore: {score}\n\nNext: Send demo invite + Calendly link",
                              "priority": 1
                          }}}
                      )
                  print(f"[SCORE] HOT LEAD: {lead.get('email')} — score={score}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"hot_leads_count={hot_leads_count}\n")

          print(f"[SCORE] Done — {hot_leads_count} hot leads")
          EOF

      - name: Emit step summary
        run: |
          echo "## Step 4 — Scoring Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Hot leads flagged:** ${{ steps.score_run.outputs.hot_leads_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Threshold:** Score > ${{ env.HOT_LEAD_THRESHOLD }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Complete" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # STEP 5 — CONVERSION AGENT
  # ============================================================
  convert:
    name: 'Step 5 — Conversion Agent'
    runs-on: ubuntu-latest
    needs: [score]
    if: |
      always() && (
        (needs.score.result == 'success' && needs.score.outputs.hot_leads_count > 0) ||
        (github.event_name == 'repository_dispatch' && github.event.action == 'hot_lead_flagged') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.start_step == '5')
      )
    outputs:
      demos_scheduled: ${{ steps.convert_run.outputs.demos_scheduled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet httpx openai supabase python-dotenv sendgrid jinja2 structlog

      - name: Run Conversion Agent
        id: convert_run
        run: |
          python - << 'EOF'
          import os, json, httpx
          from supabase import create_client
          from openai import OpenAI
          import sendgrid
          from sendgrid.helpers.mail import Mail

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          openai_client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          sg = sendgrid.SendGridAPIClient(api_key=os.environ["SENDGRID_API_KEY"])
          dry_run = os.environ["DRY_RUN"] == "true"
          CALENDLY_LINK = "https://calendly.com/garcar-demo/15min"

          hot_leads = [] if dry_run else supabase.table("iras_leads").select("*").eq("status", "hot").execute().data

          demos_scheduled = 0
          for lead in hot_leads:
              proposal = openai_client.chat.completions.create(
                  model="gpt-4o",
                  messages=[{"role": "system", "content":
                      "You are a Garcar Enterprise sales agent. Write a brief, compelling demo invite. Include the Calendly link naturally. Max 80 words."
                  }, {"role": "user", "content":
                      f"Write a demo invite for {lead.get('first_name')} at {lead.get('company_name')}. They scored {lead.get('score')}. Pain context: {lead.get('pain_data','')}. Include calendly link: {CALENDLY_LINK}"
                  }]
              ).choices[0].message.content

              if not dry_run:
                  msg = Mail(
                      from_email=os.environ["SENDGRID_FROM_EMAIL"],
                      to_emails=lead.get("email"),
                      subject=f"Let's talk — 15 min to show you what we built, {lead.get('first_name','there')}",
                      plain_text_content=proposal
                  )
                  sg.send(msg)

                  supabase.table("iras_leads").update({
                      "status": "demo_invited",
                      "demo_invited_at": "now()"
                  }).eq("id", lead["id"]).execute()

                  demos_scheduled += 1

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"demos_scheduled={demos_scheduled}\n")

          print(f"[CONVERT] Done — {demos_scheduled} demo invites sent")
          EOF

      - name: Emit step summary
        run: |
          echo "## Step 5 — Conversion Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Demo invites sent:** ${{ steps.convert_run.outputs.demos_scheduled }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CTA:** Calendly 15-min demo" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Complete" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # STEP 6 — BILLING AGENT
  # ============================================================
  bill:
    name: 'Step 6 — Billing Agent'
    runs-on: ubuntu-latest
    needs: [convert]
    if: |
      always() && (
        (github.event_name == 'repository_dispatch' && github.event.action == 'stripe_checkout_completed') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.start_step == '6')
      )
    outputs:
      invoices_created: ${{ steps.bill_run.outputs.invoices_created }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet stripe supabase python-dotenv httpx structlog

      - name: Run Billing Agent
        id: bill_run
        run: |
          python - << 'EOF'
          import os, json, stripe
          from supabase import create_client

          stripe.api_key = os.environ["STRIPE_SECRET_KEY"]
          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          dry_run = os.environ["DRY_RUN"] == "true"

          PRODUCTS = {
              "garcar-audit-299":   {"price": 29900,  "mode": "payment",      "name": "AI Automation Audit"},
              "garcar-starter-500": {"price": 50000,  "mode": "subscription", "name": "Garcar Starter $500/mo"},
              "garcar-pro-2000":    {"price": 200000, "mode": "subscription", "name": "Garcar Pro $2000/mo"},
              "dfwdata-197":        {"price": 19700,  "mode": "payment",      "name": "DFW Contractor Database"},
              "dfwdata-97mo":       {"price": 9700,   "mode": "subscription", "name": "DFW Data $97/mo"},
              "sprint-deposit-5000":{"price": 500000, "mode": "payment",      "name": "30-Day Sprint Deposit"},
          }

          lead_id = "${{ github.event.client_payload.lead_id || '' }}"
          product_id = "${{ github.event.client_payload.product_id || 'garcar-starter-500' }}"
          invoices_created = 0

          if lead_id and not dry_run:
              lead = supabase.table("iras_leads").select("*").eq("id", lead_id).single().execute().data
              product = PRODUCTS.get(product_id, PRODUCTS["garcar-starter-500"])

              customers = stripe.Customer.list(email=lead["email"]).data
              if customers:
                  customer = customers[0]
              else:
                  customer = stripe.Customer.create(
                      email=lead["email"],
                      name=f"{lead.get('first_name','')} {lead.get('last_name','')}",
                      metadata={"lead_id": lead_id, "batch_id": lead.get("batch_id")}
                  )

              price = stripe.Price.create(
                  unit_amount=product["price"],
                  currency="usd",
                  recurring={"interval": "month"} if product["mode"] == "subscription" else None,
                  product_data={"name": product["name"]}
              )
              payment_link = stripe.PaymentLink.create(
                  line_items=[{"price": price.id, "quantity": 1}],
                  metadata={"lead_id": lead_id, "product_id": product_id}
              )

              supabase.table("iras_leads").update({
                  "status": "billing_sent",
                  "stripe_customer_id": customer.id,
                  "payment_link": payment_link.url,
                  "billed_at": "now()"
              }).eq("id", lead_id).execute()

              invoices_created = 1
              print(f"[BILL] Payment link: {payment_link.url}")

          elif dry_run:
              print("[BILL] Dry run — skipping Stripe calls")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"invoices_created={invoices_created}\n")
          EOF

      - name: Emit step summary
        run: |
          echo "## Step 6 — Billing Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Invoices created:** ${{ steps.bill_run.outputs.invoices_created }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Products:** audit-299 | starter-500 | pro-2000 | data-197 | data-97mo | sprint-5000" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Complete" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # STEP 7 — ONBOARDING AGENT
  # ============================================================
  onboard:
    name: 'Step 7 — Onboarding Agent'
    runs-on: ubuntu-latest
    needs: [bill]
    if: |
      always() && (
        (github.event_name == 'repository_dispatch' && github.event.action == 'stripe_payment_succeeded') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.start_step == '7')
      )
    outputs:
      customers_onboarded: ${{ steps.onboard_run.outputs.customers_onboarded }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet stripe supabase httpx python-dotenv sendgrid openai structlog

      - name: Run Onboarding Agent
        id: onboard_run
        run: |
          python - << 'EOF'
          import os, json, secrets, hashlib, httpx, stripe
          from supabase import create_client
          from openai import OpenAI
          import sendgrid
          from sendgrid.helpers.mail import Mail

          stripe.api_key = os.environ["STRIPE_SECRET_KEY"]
          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          openai_client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          sg = sendgrid.SendGridAPIClient(api_key=os.environ["SENDGRID_API_KEY"])
          dry_run = os.environ["DRY_RUN"] == "true"

          stripe_customer_id = "${{ github.event.client_payload.stripe_customer_id || '' }}"
          product_id = "${{ github.event.client_payload.product_id || '' }}"
          customers_onboarded = 0

          if stripe_customer_id and not dry_run:
              lead = supabase.table("iras_leads").select("*").eq("stripe_customer_id", stripe_customer_id).single().execute().data

              api_key = f"gce_{secrets.token_urlsafe(32)}"
              api_key_hash = hashlib.sha256(api_key.encode()).hexdigest()

              supabase.table("garcar_customers").insert({
                  "stripe_customer_id": stripe_customer_id,
                  "email": lead["email"],
                  "first_name": lead.get("first_name"),
                  "company": lead.get("company_name"),
                  "plan": product_id,
                  "api_key_hash": api_key_hash,
                  "status": "active",
                  "onboarded_at": "now()"
              }).execute()

              supabase.table("iras_leads").update({
                  "status": "customer",
                  "converted_at": "now()"
              }).eq("id", lead["id"]).execute()

              welcome_email = openai_client.chat.completions.create(
                  model="gpt-4o",
                  messages=[{"role": "system", "content":
                      "You are Garcar Enterprise's onboarding AI. Write a warm, specific welcome email. Include next steps. Max 150 words."
                  }, {"role": "user", "content":
                      f"Write welcome email for {lead.get('first_name')} at {lead.get('company_name')} who just subscribed to {product_id}. Include their API key (masked): {api_key[:12]}... and link to dashboard: https://garcar.io/dashboard"
                  }]
              ).choices[0].message.content

              msg = Mail(
                  from_email=os.environ["SENDGRID_FROM_EMAIL"],
                  to_emails=lead["email"],
                  subject=f"Welcome to Garcar Enterprise, {lead.get('first_name','there')}",
                  plain_text_content=welcome_email
              )
              sg.send(msg)

              httpx.post("https://api.linear.app/graphql",
                  headers={"Authorization": os.environ["LINEAR_API_KEY"]},
                  json={"query": '''mutation CreateIssue($input: IssueCreateInput!) {
                      issueCreate(input: $input) { issue { id identifier } }
                  }''', "variables": {"input": {
                      "teamId": os.environ["LINEAR_TEAM_ID"],
                      "title": f"NEW CUSTOMER: {lead.get('first_name')} @ {lead.get('company_name')} — {product_id}",
                      "description": f"Customer ID: {stripe_customer_id}\nPlan: {product_id}\nEmail: {lead['email']}\nOnboarded: today\n\nNext: 30-day check-in scheduled",
                      "priority": 2
                  }}}
              )

              customers_onboarded = 1
              print(f"[ONBOARD] Customer {lead.get('email')} provisioned on {product_id}")

          elif dry_run:
              print("[ONBOARD] Dry run — skipping provisioning")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"customers_onboarded={customers_onboarded}\n")
          EOF

      - name: Emit step summary
        run: |
          echo "## Step 7 — Onboarding Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Customers onboarded:** ${{ steps.onboard_run.outputs.customers_onboarded }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actions:** API key provisioned | Welcome email sent | Linear issue created | Dashboard access granted" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Complete" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # PIPELINE REPORT
  # ============================================================
  pipeline_report:
    name: 'Pipeline Report'
    runs-on: ubuntu-latest
    needs: [prospect, enrich, outreach, score, convert, bill, onboard]
    if: always()

    steps:
      - name: Generate Pipeline Report
        run: |
          echo "# IRAS Pipeline Run — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Agent | Result | Metric |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Prospecting | ${{ needs.prospect.result }} | ${{ needs.prospect.outputs.leads_discovered || 'n/a' }} leads |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Enrichment  | ${{ needs.enrich.result }}  | ${{ needs.enrich.outputs.enriched_leads || 'n/a' }} enriched |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Outreach    | ${{ needs.outreach.result }} | ${{ needs.outreach.outputs.emails_sent || 'n/a' }} sent |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Scoring     | ${{ needs.score.result }}   | ${{ needs.score.outputs.hot_leads_count || 'n/a' }} hot |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | Conversion  | ${{ needs.convert.result }} | ${{ needs.convert.outputs.demos_scheduled || 'n/a' }} demos |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | Billing     | ${{ needs.bill.result }}    | ${{ needs.bill.outputs.invoices_created || 'n/a' }} invoices |" >> $GITHUB_STEP_SUMMARY
          echo "| 7 | Onboarding  | ${{ needs.onboard.result }} | ${{ needs.onboard.outputs.customers_onboarded || 'n/a' }} customers |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Dry Run:** ${{ env.DRY_RUN }}" >> $GITHUB_STEP_SUMMARY
          echo "> **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "> **Hot Lead Threshold:** ${{ env.HOT_LEAD_THRESHOLD }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify Linear — Pipeline Complete
        if: success()
        run: |
          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "mutation { commentCreate(input: { body: \"IRAS pipeline run complete\" }) { comment { id } } }"}' || true
