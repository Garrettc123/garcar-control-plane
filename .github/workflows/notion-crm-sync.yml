name: Notion CRM Sync

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes to Supabase)'
        type: boolean
        default: false
  repository_dispatch:
    types: [notion_crm_sync]

concurrency:
  group: notion-crm-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Notion CRM → Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Sync leads and customers
        id: sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CRM_DB_ID: '8583f88b-69c8-4b55-9c1e-c32783d68ac1'
          NOTION_CUSTOMERS_DB_ID: 'ee4024e8-799b-8335-89ed-8792ac238b5b'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/notion_crm_sync.py

      - name: Summary
        run: |
          echo "## Notion CRM Sync" >> $GITHUB_STEP_SUMMARY
          echo "- Leads synced: ${{ steps.sync.outputs.leads_synced }}" >> $GITHUB_STEP_SUMMARY
          echo "- Customers synced: ${{ steps.sync.outputs.customers_synced }}" >> $GITHUB_STEP_SUMMARY
