# ============================================================
# IRAS Email Sequence Follow-up Cron
# Sends Day 3, 7, and 14 follow-up emails to leads
# who enrolled in the sequence N days ago.
# Runs daily at noon UTC (7AM CDT).
# ============================================================

name: IRAS Sequence Follow-up

on:
  schedule:
    - cron: '0 12 * * 1-5'    # 7AM CDT Mon–Fri
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — log emails but do not send'
        required: false
        default: 'false'
        type: boolean

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
  SENDGRID_API_KEY:     ${{ secrets.SENDGRID_API_KEY }}
  SENDGRID_FROM_EMAIL:  ${{ secrets.SENDGRID_FROM_EMAIL }}
  DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  followup:
    name: 'Send sequence follow-ups'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet httpx openai supabase python-dotenv sendgrid structlog

      - name: Send follow-ups
        id: followup_run
        run: |
          python - << 'EOF'
          import os, json, httpx
          from datetime import datetime, timezone, timedelta
          from supabase import create_client
          from openai import OpenAI
          import sendgrid
          from sendgrid.helpers.mail import Mail, CustomArg

          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          openai_client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])
          sg = sendgrid.SendGridAPIClient(api_key=os.environ["SENDGRID_API_KEY"])
          dry_run = os.environ["DRY_RUN"] == "true"

          now = datetime.now(timezone.utc)

          # Each follow-up: (status_to_match, days_since_enrolled, next_status, subject, template_hint)
          FOLLOWUPS = [
              (
                  "outreach_day0", 3, "outreach_day3",
                  "The DFW contractor gap I keep seeing",
                  "Day 3 value email. Mention that most DFW roofing contractors lose 3-5 jobs per storm event due to slow lead response. No hard sell. End with a soft CTA to reply or book a call."
              ),
              (
                  "outreach_day3", 7, "outreach_day7",
                  "What 3 DFW contractors did in 30 days",
                  "Day 7 social proof email. Reference 3 hypothetical DFW roofing contractors who automated their lead response and quote delivery. Specific numbers: 2 extra jobs/month, 10 hrs/week saved. CTA: 15-min call."
              ),
              (
                  "outreach_day7", 14, "outreach_day14",
                  "Closing the loop, {first_name}",
                  "Day 14 breakup email. Short. Say this is the last email. Acknowledge they're probably busy with storm season. Leave the door open. One sentence CTA."
              ),
          ]

          total_sent = 0
          total_skipped = 0

          for current_status, days_threshold, next_status, subject_template, template_hint in FOLLOWUPS:
              cutoff = now - timedelta(days=days_threshold)
              cutoff_low = now - timedelta(days=days_threshold + 1)

              # Leads enrolled exactly N days ago (within a 24hr window)
              leads = [] if dry_run else (
                  supabase.table("iras_leads")
                  .select("*")
                  .eq("status", current_status)
                  .gte("outreach_enrolled_at", cutoff_low.isoformat())
                  .lte("outreach_enrolled_at", cutoff.isoformat())
                  .execute().data
              )

              # Dry run: use a sample batch for visibility
              if dry_run:
                  sample = supabase.table("iras_leads").select("*").eq("status", current_status).limit(3).execute().data
                  print(f"[FOLLOWUP] DRY RUN | {current_status} → {next_status} | sample={len(sample)} leads")
                  for lead in sample:
                      print(f"  Would send '{subject_template}' to {lead.get('email')}")
                  continue

              print(f"[FOLLOWUP] {current_status} → {next_status} | {len(leads)} leads due")

              for lead in leads:
                  if not lead.get("email"):
                      total_skipped += 1
                      continue

                  first = lead.get("first_name") or "there"
                  company = lead.get("company_name") or "your company"
                  subject = subject_template.replace("{first_name}", first)

                  try:
                      body = openai_client.chat.completions.create(
                          model="gpt-4o",
                          messages=[{
                              "role": "system",
                              "content": (
                                  "You write follow-up cold email sequences for Garcar Enterprise, "
                                  "targeting DFW roofing contractor owners. "
                                  "Max 100 words. Conversational, not salesy. No bullet points."
                              )
                          }, {
                              "role": "user",
                              "content": f"Write for {first} at {company}. {template_hint}"
                          }]
                      ).choices[0].message.content
                  except Exception as e:
                      print(f"[FOLLOWUP] OpenAI error for {lead.get('email')}: {e}")
                      total_skipped += 1
                      continue

                  try:
                      msg = Mail(
                          from_email=os.environ["SENDGRID_FROM_EMAIL"],
                          to_emails=lead["email"],
                          subject=subject,
                          plain_text_content=body
                      )
                      msg.add_custom_arg(CustomArg("lead_id", lead["id"]))
                      msg.add_custom_arg(CustomArg("batch_id", lead.get("batch_id", "")))
                      msg.add_custom_arg(CustomArg("sequence_day", next_status.split("day")[1]))
                      sg.send(msg)

                      supabase.table("iras_leads").update({
                          "status": next_status
                      }).eq("id", lead["id"]).execute()

                      total_sent += 1
                  except Exception as e:
                      print(f"[FOLLOWUP] Send error for {lead.get('email')}: {e}")
                      total_skipped += 1

          print(f"[FOLLOWUP] Done — sent={total_sent} skipped={total_skipped}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"emails_sent={total_sent}\n")
              f.write(f"emails_skipped={total_skipped}\n")
          EOF

      - name: Emit step summary
        run: |
          echo "## IRAS Sequence Follow-up — $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "- **Emails sent:** ${{ steps.followup_run.outputs.emails_sent }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped:** ${{ steps.followup_run.outputs.emails_skipped }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Sequences:** Day 0→3 | Day 3→7 | Day 7→14" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run:** ${{ env.DRY_RUN }}" >> $GITHUB_STEP_SUMMARY
